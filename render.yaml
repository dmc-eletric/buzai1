services:
  - type: web
    name: buaizai-api
    env: python
    region: singapore          # Nearest to Japan
    plan: free                 # Upgrade to starter for production
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buaizai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEFAULT_ADMIN_ID
        value: admin
      - key: DEFAULT_ADMIN_PW
        value: admin1234
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: STORAGE_BACKEND
        value: local
      - key: LOCAL_BASE_URL
        value: https://buaizai-api.onrender.com   # ← 変更してください
      - key: TOKEN_EXPIRE_HOURS
        value: "12"
      - key: AUTO_CLEANUP_DAYS
        value: "0"

databases:
  - name: buaizai-db
    databaseName: buaizai
    user: buaizai_user
    plan: free
